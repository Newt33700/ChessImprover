<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover"/>
  <meta name="theme-color" content="#0d0d0d"/>
  <meta name="description" content="Chess Improver – Analyse gratuite coup par coup"/>
  <title>Chess Improver ♞</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=Inter:wght@400;500;700&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/chessboard-js/1.0.0/chessboard-1.0.0.min.css"/>
  <link rel="stylesheet" href="css/style.css"/>
</head>
<body>

<!-- Toasts -->
<div id="toast-container" aria-live="polite"></div>

<!-- Loading -->
<div id="loading-overlay" hidden role="status">
  <div class="loading-spinner"></div>
  <p class="loading-message">Chargement…</p>
</div>

<!-- ══════════════════ HEADER ══════════════════ -->
<header class="app-header">
  <button class="logo-btn" onclick="window.app?._showSection('section-dashboard')" aria-label="Accueil">
    <span class="logo-knight">♞</span>
    <span class="logo-text">Chess<strong>Improver</strong></span>
  </button>

  <div id="gamification-bar">
    <div id="streak-display" class="streak-badge">🔥 <strong>0</strong></div>
    <div class="xp-block">
      <span id="level-display" class="level-badge">Niv. 1</span>
      <div class="xp-bar-container"><div id="xp-bar" class="xp-bar-fill"></div></div>
      <span id="xp-display" class="xp-label">0 XP</span>
    </div>
  </div>

  <div id="current-user"></div>
</header>

<!-- ══════════════════ MAIN ══════════════════ -->
<main class="app-main">

  <!-- ── DASHBOARD ── -->
  <section id="section-dashboard" class="section">

    <div class="connect-card card">
      <h2 class="card-title">Analysez vos parties</h2>
      <p class="card-subtitle">Entrez votre pseudo Chess.com ou collez un PGN.</p>
      <div class="input-row">
        <input id="username-input" type="text" placeholder="Pseudo Chess.com"
               autocomplete="off" autocapitalize="none" spellcheck="false" aria-label="Pseudo"/>
        <button id="btn-connect" class="btn btn--primary">Charger</button>
      </div>
      <div class="or-divider"><span>ou</span></div>
      <button id="btn-to-pgn" class="btn btn--secondary">📋 Coller un PGN</button>
    </div>

    <div class="stats-grid">
      <div class="stat-card"><div class="stat-value" id="stat-games">0</div><div class="stat-label">Parties</div></div>
      <div class="stat-card"><div class="stat-value" id="stat-accuracy">—</div><div class="stat-label">Précision</div></div>
      <div class="stat-card"><div class="stat-value" id="stat-blunders">0</div><div class="stat-label">Gaffes</div></div>
    </div>

    <div class="card">
      <div class="card-header">
        <h3 class="card-title">Parties récentes</h3>
        <button id="btn-exercise" class="btn btn--accent btn--sm">🧠 Révisions</button>
      </div>
      <div id="games-list" class="games-list">
        <p class="empty-state">Connectez-vous pour voir vos parties.</p>
      </div>
    </div>

  </section>

  <!-- ── PGN INPUT ── -->
  <section id="section-pgn" class="section" hidden>
    <div class="card">
      <div class="card-header">
        <h2 class="card-title">Analyser un PGN</h2>
        <button id="btn-back-dashboard" class="btn-icon" aria-label="Retour">←</button>
      </div>
      <textarea id="pgn-input" class="pgn-textarea" rows="10" spellcheck="false"
        placeholder="Collez votre PGN ici…&#10;[Event &quot;Live Chess&quot;]&#10;[White &quot;VotreNom&quot;]&#10;..."></textarea>
      <button id="btn-analyze" class="btn btn--primary btn--full">🔍 Analyser</button>
    </div>
  </section>

  <!-- ── BOARD ── -->
  <section id="section-board" class="section" hidden>

    <div class="board-topbar">
      <button id="btn-back-board" class="btn-icon" aria-label="Retour">←</button>
      <div class="mode-pills">
        <button class="mode-pill active" onclick="window.app?.currentGame && window.app._enterReviewMode(window.app.currentGame)">Review</button>
        <button class="mode-pill" onclick="window.app?._startExercise()">Exercice</button>
      </div>
      <div id="engine-eval" class="engine-eval">…</div>
    </div>

    <div class="board-layout">
      <div class="board-wrapper">
        <div class="player-bar" id="bar-top">
          <div class="player-piece-indicator" id="piece-top"></div>
          <span class="player-name" id="name-top">Adversaire</span>
          <span class="player-clock" id="clock-top">—</span>
        </div>
        <div class="board-area">
          <div id="board" class="board-container"></div>
          <div id="move-badge" class="move-badge"></div>
        </div>
        <div class="player-bar" id="bar-bottom">
          <div class="player-piece-indicator" id="piece-bottom"></div>
          <span class="player-name" id="name-bottom">Vous</span>
          <span class="player-clock" id="clock-bottom">—</span>
        </div>
        <div class="board-controls">
          <button id="btn-flip" class="btn-icon" title="Retourner">⇅</button>
          <button id="btn-prev" class="btn-icon" title="Précédent">‹</button>
          <button id="btn-next" class="btn-icon" title="Suivant">›</button>
        </div>
      </div>

      <aside class="side-panel">
        <div id="move-info" class="move-info-box"></div>
        <div id="accuracy-bar" class="accuracy-bar-wrap" hidden>
          <div class="accuracy-bar-label">
            <span>Précision</span>
            <strong id="accuracy-value">—</strong>
          </div>
          <div class="accuracy-bar-track">
            <div id="accuracy-fill" class="accuracy-bar-fill" style="width:0%"></div>
          </div>
        </div>
        <div id="game-stats" class="game-stats"></div>
        <div id="exercise-prompt" class="exercise-prompt" hidden></div>
        <div class="turn-indicator">Tour : <strong id="turn-indicator">Blancs</strong></div>
        <div class="moves-panel">
          <div class="moves-panel-header">Coups</div>
          <div id="moves-list" class="moves-list"></div>
        </div>
      </aside>
    </div>

  </section>

</main>

<!-- Scripts -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/chessboard-js/1.0.0/chessboard-1.0.0.min.js"></script>
<script src="js/board_manager.js"></script>
<script src="js/app.js"></script>
</body>
</html>
