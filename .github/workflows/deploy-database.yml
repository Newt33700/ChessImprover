# CI/CD 3 – Database : Lint SQL + applique les migrations (EPIC 39 — CockroachDB)
#
# Ex-pipeline Supabase (`supabase/setup-cli` + `supabase db push`, secrets
# SUPABASE_ACCESS_TOKEN/SUPABASE_DB_PASSWORD/SUPABASE_PROJECT_ID) : remplacé
# après saturation du quota gratuit Supabase. `scripts/apply_migrations.py`
# (EPIC 39) fonctionne contre n'importe quel Postgres compatible via son DSN
# — même secret DATABASE_URL que `ingest-puzzles.yml`, aucun secret Supabase
# n'est plus nécessaire ici.
name: Deploy Database Migrations

on:
  push:
    branches: [main]
    paths:
      - "supabase/migrations/**"
  pull_request:
    branches: [main]
    paths:
      - "supabase/migrations/**"
  workflow_dispatch: {}

jobs:
  # ── Lint des migrations SQL ─────────────────────────────────────────────────
  lint-migrations:
    name: Lint SQL migrations
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install sqlfluff
        run: pip install sqlfluff

      - name: Lint SQL files
        run: |
          sqlfluff lint supabase/migrations/ \
            --dialect postgres \
            --exclude-rules LT12,AM06,PG01

  # ── Déploiement des migrations (main seulement) ─────────────────────────────
  push-migrations:
    name: Apply migrations to database
    needs: lint-migrations
    runs-on: ubuntu-latest
    if: >-
      github.ref == 'refs/heads/main' &&
      (github.event_name == 'push' || github.event_name == 'workflow_dispatch')

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        working-directory: backend
        run: pip install -r requirements.txt

      # DATABASE_URL (CockroachDB Cloud) utilise sslmode=verify-full : le
      # certificat racine du cluster doit être présent localement, sinon
      # psycopg échoue avec « root certificate file ... does not exist ».
      - name: Download CockroachDB CA certificate
        run: |
          mkdir -p "$HOME/.postgresql"
          curl --create-dirs -o "$HOME/.postgresql/root.crt" \
            'https://cockroachlabs.cloud/clusters/206ab806-09a1-4320-8a47-2080e53e9b40/cert'

      - name: Apply migrations
        working-directory: backend
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          if [ -z "$DATABASE_URL" ]; then
            echo "::error::Secret DATABASE_URL non configuré (Settings > Secrets and variables > Actions)."
            exit 1
          fi
          python -m scripts.apply_migrations "$DATABASE_URL"
