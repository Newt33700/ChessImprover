# CI/CD 6 – Ingestion ponctuelle du référentiel ECO (EPIC 38 — Lotus Mastery Engine)
#
# Déclenchement manuel uniquement (workflow_dispatch) : job à la demande
# pour peupler (ou rafraîchir) la table `eco_reference` depuis les TSV
# déjà présents dans le dépôt (`frontend/assets/data/openings/*.tsv`,
# rapatriés localement EPIC 13 — aucun accès réseau externe nécessaire ici,
# contrairement à `ingest-puzzles.yml`). Nécessite le secret DATABASE_URL
# (même secret que `deploy-database.yml`/`ingest-puzzles.yml` depuis EPIC 39).
name: Seed ECO Reference

on:
  workflow_dispatch: {}

jobs:
  seed:
    name: Seed eco_reference
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        working-directory: backend
        run: pip install -r requirements.txt

      # DATABASE_URL (CockroachDB Cloud) utilise sslmode=verify-full : le
      # certificat racine du cluster doit être présent localement, sinon
      # psycopg échoue avec « root certificate file ... does not exist ».
      - name: Download CockroachDB CA certificate
        run: |
          mkdir -p "$HOME/.postgresql"
          curl --create-dirs -o "$HOME/.postgresql/root.crt" \
            'https://cockroachlabs.cloud/clusters/206ab806-09a1-4320-8a47-2080e53e9b40/cert'

      - name: Run seed_eco
        working-directory: backend
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          if [ -z "$DATABASE_URL" ]; then
            echo "::error::Secret DATABASE_URL non configuré (Settings > Secrets and variables > Actions)."
            exit 1
          fi
          python -m scripts.seed_eco
