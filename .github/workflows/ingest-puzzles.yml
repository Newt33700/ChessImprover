# CI/CD 5 – Ingestion ponctuelle du catalogue de puzzles Lichess (EPIC 37)
#
# Déclenchement manuel uniquement (workflow_dispatch) : ce n'est pas un
# pipeline exécuté à chaque push, mais un job à la demande pour peupler (ou
# rafraîchir) la table `lichess_puzzles`. Nécessite le secret DATABASE_URL
# (à ajouter dans Settings > Secrets and variables > Actions — même secret
# que `deploy-database.yml` depuis EPIC 39, la connexion Postgres directe du
# backend, pas un secret propre à Supabase).
name: Ingest Lichess Puzzles

on:
  workflow_dispatch:
    inputs:
      dump_url:
        description: >-
          URL du dump .csv.zst (laisser vide pour le dump officiel
          https://database.lichess.org/lichess_db_puzzle.csv.zst)
        required: false
        default: ""

jobs:
  ingest:
    name: Ingest lichess_db_puzzle.csv.zst
    runs-on: ubuntu-latest
    timeout-minutes: 300
    concurrency:
      group: ingest-lichess-puzzles
      cancel-in-progress: false

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        working-directory: backend
        run: pip install -r requirements.txt

      # DATABASE_URL (CockroachDB Cloud) utilise sslmode=verify-full : le
      # certificat racine du cluster doit être présent localement, sinon
      # psycopg échoue avec « root certificate file ... does not exist ».
      - name: Download CockroachDB CA certificate
        run: |
          mkdir -p "$HOME/.postgresql"
          curl --create-dirs -o "$HOME/.postgresql/root.crt" \
            'https://cockroachlabs.cloud/clusters/206ab806-09a1-4320-8a47-2080e53e9b40/cert'

      - name: Run ingestion
        working-directory: backend
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          DUMP_URL: ${{ inputs.dump_url }}
        run: |
          if [ -z "$DATABASE_URL" ]; then
            echo "::error::Secret DATABASE_URL non configuré (Settings > Secrets and variables > Actions)."
            exit 1
          fi
          if [ -n "$DUMP_URL" ]; then
            python -m scripts.ingest_lichess_puzzles "$DUMP_URL"
          else
            python -m scripts.ingest_lichess_puzzles
          fi
